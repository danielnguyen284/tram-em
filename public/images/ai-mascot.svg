<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bgGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ccaeff" />
      <stop offset="100%" stop-color="#9a6fd9" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000000" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Face Base (Squircle) -->
  <rect x="25" y="25" width="150" height="150" rx="60" fill="url(#bgGlow)" filter="url(#shadow)" />
  
  <!-- Subtle inner border -->
  <rect x="25" y="25" width="150" height="150" rx="60" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.4" />

  <!-- Blush -->
  <ellipse cx="55" cy="120" rx="20" ry="12" fill="#ff7eb3" opacity="0.5" />
  <ellipse cx="145" cy="120" rx="20" ry="12" fill="#ff7eb3" opacity="0.5" />

  <!-- Eyes -->
  <circle cx="70" cy="95" r="22" fill="#311959" />
  <circle cx="130" cy="95" r="22" fill="#311959" />
  
  <!-- Eye Highlights -->
  <circle cx="78" cy="86" r="7" fill="#ffffff" />
  <circle cx="62" cy="105" r="3" fill="#ffffff" opacity="0.8" />
  
  <circle cx="138" cy="86" r="7" fill="#ffffff" />
  <circle cx="122" cy="105" r="3" fill="#ffffff" opacity="0.8" />

  <!-- Smile -->
  <path d="M 85 130 Q 100 148 115 130" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" />
</svg>
